<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mở đầu</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="intro-page">
  <canvas id="galaxyCanvas" aria-label="Bầu trời sao tương tác"></canvas>

  <main class="intro-content">
    <p class="eyebrow">Một bầu trời nhỏ dành riêng cho Em ✨</p>
    <h1>Gửi đến Em</h1>
    <p class="intro-text">
      Có vài điều anh đã giữ trong lòng khá lâu. Hôm nay, anh muốn gửi đến em một cách thật đặc biệt —
      bắt đầu từ những vì sao này.
    </p>
    <button class="primary-btn" id="exploreBtn" type="button">
      <span>Khám phá</span>
      <span class="btn-glow"></span>
    </button>
  </main>

  <div class="drag-hint" id="dragHint">
    <span>☝️</span>
    Kéo chuột hoặc chạm tay để xoay
  </div>

  <div class="transition-text" id="transitionText">Những vì sao đang mở ra câu chuyện...</div>

  <script type="module" src="assets/js/galaxy-intro.js"></script>
</body>
</html>
