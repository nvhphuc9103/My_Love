<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Câu chuyện gửi Em</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="story-page story-bg-peace">
  <div class="story-stars"></div>

  <main class="story-shell">
    <section class="story-card" id="storyCard">
      <div class="story-topline">
        <span id="storyStep">01</span>
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      </div>

      <div class="scene-frame">
        <div class="scene-orb" id="sceneOrb">🌙</div>
        <div class="scene-caption" id="sceneCaption">Một ngày bình yên</div>
      </div>

      <p class="eyebrow" id="storyTag">Mở đầu</p>
      <h1 id="storyTitle">Anh vốn đang yên bình</h1>
      <p class="story-text" id="storyText"></p>

      <div class="story-actions">
        <button class="ghost-btn" id="backBtn" type="button">Quay lại</button>
        <button class="primary-btn compact" id="nextBtn" type="button">Tiếp tục</button>
      </div>
    </section>
  </main>

  <script src="assets/js/story.js"></script>
</body>
</html>
